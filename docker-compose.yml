version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: medchain-postgres
    environment:
      POSTGRES_DB: medchain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medchain-network

  redis:
    image: redis:7-alpine
    container_name: medchain-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - medchain-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medchain-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/medchain
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    networks:
      - medchain-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: medchain-nginx
    depends_on:
      - backend
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - medchain-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  medchain-network:
    driver: bridge
