<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - MedChain</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/nav.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <span class="logo">🏥</span>
                <span class="brand-name">MedChain</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="verify.html" class="nav-link">Verify</a>
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        </div>
    </nav>

    <section class="auth-section">
        <div class="container">
            <div class="auth-container">
                <!-- Login Form -->
                <div id="loginForm" class="auth-card">
                    <h2>Welcome Back</h2>
                    <p class="auth-subtitle">Login to your MedChain account</p>

                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="loginEmail" required placeholder="your@email.com">
                        </div>

                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="loginPassword" required placeholder="••••••••">
                        </div>

                        <button type="submit" class="btn btn-primary btn-large">Login</button>
                    </form>

                    <p class="auth-switch">
                        Don't have an account? 
                        <a href="#" onclick="showRegister()">Register here</a>
                    </p>
                </div>

                <!-- Register Form -->
                <div id="registerForm" class="auth-card hidden">
                    <h2>Create Account</h2>
                    <p class="auth-subtitle">Join MedChain to verify medicines</p>

                    <form onsubmit="handleRegister(event)">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="regName" required placeholder="John Doe">
                        </div>

                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="regEmail" required placeholder="your@email.com">
                        </div>

                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" id="regPhone" placeholder="+91 9876543210">
                        </div>

                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="regPassword" required placeholder="••••••••">
                            <small>Min 8 characters, 1 uppercase, 1 lowercase, 1 number, 1 special char</small>
                        </div>

                        <div class="form-group">
                            <label>I am a:</label>
                            <select id="regRole" onchange="toggleManufacturerFields()">
                                <option value="PATIENT">Patient</option>
                                <option value="CHEMIST">Chemist</option>
                                <option value="MANUFACTURER">Manufacturer</option>
                            </select>
                        </div>

                        <!-- Manufacturer Fields -->
                        <div id="manufacturerFields" class="hidden">
                            <div class="form-group">
                                <label>Company Name</label>
                                <input type="text" id="regCompany" placeholder="Company Pvt Ltd">
                            </div>

                            <div class="form-group">
                                <label>License Number</label>
                                <input type="text" id="regLicense" placeholder="MH-MFG-2024-XXX">
                            </div>

                            <div class="form-group">
                                <label>GST Number</label>
                                <input type="text" id="regGst" placeholder="27AAACR5055K1Z4">
                            </div>

                            <div class="form-group">
                                <label>Address</label>
                                <textarea id="regAddress" rows="2"></textarea>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label>City</label>
                                    <input type="text" id="regCity">
                                </div>
                                <div class="form-group">
                                    <label>State</label>
                                    <input type="text" id="regState">
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Pincode</label>
                                <input type="text" id="regPincode" placeholder="400001">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-large">Create Account</button>
                    </form>

                    <p class="auth-switch">
                        Already have an account? 
                        <a href="#" onclick="showLogin()">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </section>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }

        function showLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        }

        function toggleManufacturerFields() {
            const role = document.getElementById('regRole').value;
            const fields = document.getElementById('manufacturerFields');
            
            if (role === 'MANUFACTURER') {
                fields.classList.remove('hidden');
                fields.querySelectorAll('input').forEach(input => input.required = true);
            } else {
                fields.classList.add('hidden');
                fields.querySelectorAll('input').forEach(input => input.required = false);
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            await login(email, password);
        }

        async function handleRegister(e) {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                phone: document.getElementById('regPhone').value,
                password: document.getElementById('regPassword').value,
                role: document.getElementById('regRole').value
            };

            if (formData.role === 'MANUFACTURER') {
                formData.companyName = document.getElementById('regCompany').value;
                formData.licenseNumber = document.getElementById('regLicense').value;
                formData.gstNumber = document.getElementById('regGst').value;
                formData.address = document.getElementById('regAddress').value;
                formData.city = document.getElementById('regCity').value;
                formData.state = document.getElementById('regState').value;
                formData.pincode = document.getElementById('regPincode').value;
            }

            await register(formData);
        }

        // Check URL for register parameter
        document.addEventListener('DOMContentLoaded', () => {
            if (getQueryParam('register') === 'true') {
                showRegister();
            }
        });
    </script>
</body>
</html>
