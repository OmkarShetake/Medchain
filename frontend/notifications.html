<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - MedChain</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/nav.css">
    <link rel="stylesheet" href="css/notifications.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="index.html" style="text-decoration:none;display:flex;align-items:center;gap:0.5rem">
                    <span class="logo">🏥</span>
                    <span class="brand-name">MedChain</span>
                </a>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="verify.html" class="nav-link">Verify</a>
                <a href="symptom.html" class="nav-link">Symptom Checker</a>
            </div>
            <div class="nav-auth" id="navAuth"></div>
        </div>
    </nav>

    <section class="notifications-section">
        <div class="page-header">
            <h1>🔔 Notifications</h1>
            <button class="btn btn-outline" onclick="markAllRead()" id="markAllBtn" style="display:none">
                ✓ Mark all as read
            </button>
        </div>

        <div id="notifList" class="notif-list">
            <div class="empty-state">
                <div class="empty-icon">⏳</div>
                <p>Loading notifications...</p>
            </div>
        </div>

        <div class="load-more" id="loadMoreDiv" style="display:none">
            <button class="btn btn-outline" onclick="loadMore()">Load more</button>
        </div>
    </section>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/notifications.js"></script>
</body>
</html>
